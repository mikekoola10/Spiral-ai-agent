services:
  - type: web
    name: spiral
    runtime: node
    repo: https://github.com/mikekoola10/spiral-ai-agent
    branch: main
    buildCommand: npm install && npm run build
    startCommand: node backend/gateway/server.js
    envVars:
      - key: PORT
        value: 3000
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: AGENTCARD_JWT
        sync: false
      - key: STELLAR_SECRET_KEY
        sync: false
      - key: STELLAR_PUBLIC_KEY
        sync: false
      - key: AGENTMAIL_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ADMIN_API_KEY
        sync: false
